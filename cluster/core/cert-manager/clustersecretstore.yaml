apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
    name: vault-issuer
spec:
    vault:
        server: http://192.168.1.48:8200
        path: pki_int/sign/k8s-cluster-role
        auth:
            kubernetes:
                role: cert-manager-role
                mountPath: /v1/auth/kubernetes
                serviceAccountRef:
                    name: cert-manager

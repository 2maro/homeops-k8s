apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-store
  namespace: external-secrets-system
spec:
  provider:
    vault:
      server: http://192.168.1.59:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: auth/kubernetes
          role: eso-role
          serviceAccountRef:
            name: external-secrets-sa

---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: kube-system
  chart:
    spec:
      chart: cilium
      version: v1.17.2
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    cluster:
      name: kubernetes
    gatewayAPI:
      enabled: true
    ipam:
      mode: kubernetes
    k8sServicePort: 6443
    kubeProxyReplacement: false
    operator:
      replicas: 1
    routingMode: tunnel
    tunnelProtocol: vxlan
    
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true

apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: external-secrets-system
  createNamespace: true
  chart:
    spec:
      chart: external-secrets
      version: 1.14
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  values:
    installCRDs: true
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128M

---
helmDefaults:
    wait: true
repositories:
    - name: cilium
      url: https://helm.cilium.io
releases:
    - name: cilium
      namespace: cilium
      installed: true
      chart: cilium/cilium
      version: 1.16.3
      createNamespace: true
      values:
          - values/cilium.yaml
      wait: true
      timeout: 600
      hooks:
          - events: ["presync"]
            showlogs: true
            command: kubectl
            args:
                - apply
                - -f
                - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
          - events: ["presync"]
            showlogs: true
            command: kubectl
            args:
                - apply
                - -f
                - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/experimental-install.yaml
          - events: ["postsync"]
            showlogs: true
            command: kubectl
            args:
                - apply
                - -f
                - values/cilium-lb-ippool.yaml
